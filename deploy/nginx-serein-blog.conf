server {
    listen 80;
    server_name serein.io.vn www.serein.io.vn 103.9.205.28;

    client_max_body_size 10M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Main application
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (if needed)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Static files - Assets
    location /assets {
        alias /var/www/serein-blog/assets;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Static files - Admin
    location /admin/css {
        alias /var/www/serein-blog/admin/css;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /admin/js {
        alias /var/www/serein-blog/admin/js;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Uploads
    location /uploads {
        alias /var/www/serein-blog/uploads;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ \.(env|ini|log)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Logging
    access_log /var/log/nginx/serein-blog-access.log;
    error_log /var/log/nginx/serein-blog-error.log;
}
