<VirtualHost *:80>
    ServerName serein.io.vn
    ServerAdmin admin@serein.io.vn

    # Document Root (for static files if needed)
    DocumentRoot /var/www/serein-blog

    # Proxy Configuration for FastAPI
    ProxyPreserveHost On
    ProxyPass /assets !
    ProxyPass / http://127.0.0.1:8000/
    ProxyPassReverse / http://127.0.0.1:8000/

    # Static Files (served directly by Apache for better performance)
    Alias /assets /var/www/serein-blog/assets
    <Directory /var/www/serein-blog/assets>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        
        # Cache static files
        <IfModule mod_expires.c>
            ExpiresActive On
            ExpiresByType image/jpg "access plus 1 year"
            ExpiresByType image/jpeg "access plus 1 year"
            ExpiresByType image/gif "access plus 1 year"
            ExpiresByType image/png "access plus 1 year"
            ExpiresByType image/webp "access plus 1 year"
            ExpiresByType text/css "access plus 1 month"
            ExpiresByType application/javascript "access plus 1 month"
            ExpiresByType application/font-woff2 "access plus 1 year"
        </IfModule>
    </Directory>

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/serein-blog-error.log
    CustomLog ${APACHE_LOG_DIR}/serein-blog-access.log combined

    # Security Headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css
        AddOutputFilterByType DEFLATE text/javascript application/javascript application/json
        AddOutputFilterByType DEFLATE application/xml application/xhtml+xml
    </IfModule>

    # Prevent access to sensitive files
    <FilesMatch "\.(py|pyc|pyo|db|sqlite|env|ini|log)$">
        Require all denied
    </FilesMatch>

    <Directory /var/www/serein-blog>
        Options -Indexes
        AllowOverride None
        Require all denied
    </Directory>
</VirtualHost>
