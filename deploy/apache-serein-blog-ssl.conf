<VirtualHost *:443>
    ServerName serein.io.vn
    ServerAdmin admin@serein.io.vn

    # SSL Configuration
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/serein.io.vn/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/serein.io.vn/privkey.pem
    
    # Modern SSL Configuration
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder off
    SSLSessionTickets off

    # Document Root
    DocumentRoot /var/www/serein-blog

    # Proxy Configuration
    ProxyPreserveHost On
    ProxyPass /assets !
    ProxyPass / http://127.0.0.1:8000/
    ProxyPassReverse / http://127.0.0.1:8000/

    # Static Files
    Alias /assets /var/www/serein-blog/assets
    <Directory /var/www/serein-blog/assets>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        
        # Cache static files
        <IfModule mod_expires.c>
            ExpiresActive On
            ExpiresByType image/jpg "access plus 1 year"
            ExpiresByType image/jpeg "access plus 1 year"
            ExpiresByType image/gif "access plus 1 year"
            ExpiresByType image/png "access plus 1 year"
            ExpiresByType image/webp "access plus 1 year"
            ExpiresByType text/css "access plus 1 month"
            ExpiresByType application/javascript "access plus 1 month"
            ExpiresByType application/font-woff2 "access plus 1 year"
        </IfModule>
    </Directory>

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/serein-blog-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/serein-blog-ssl-access.log combined

    # Security Headers
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"

    # Compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css
        AddOutputFilterByType DEFLATE text/javascript application/javascript application/json
        AddOutputFilterByType DEFLATE application/xml application/xhtml+xml
    </IfModule>

    # Prevent access to sensitive files
    <FilesMatch "\.(py|pyc|pyo|db|sqlite|env|ini|log)$">
        Require all denied
    </FilesMatch>

    <Directory /var/www/serein-blog>
        Options -Indexes
        AllowOverride None
        Require all denied
    </Directory>
</VirtualHost>

# Redirect HTTP to HTTPS
<VirtualHost *:80>
    ServerName serein.io.vn
    
    # Redirect all HTTP traffic to HTTPS
    Redirect permanent / https://serein.io.vn/
    
    # Allow Let's Encrypt verification
    Alias /.well-known/acme-challenge/ /var/www/html/.well-known/acme-challenge/
    <Directory /var/www/html/.well-known/acme-challenge/>
        Options None
        AllowOverride None
        Require all granted
    </Directory>
</VirtualHost>
