<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Projects - Serein Blog Admin</title>

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap4.min.css">
</head>

<body class="hold-transition sidebar-mini">
    <div class="wrapper">

        <!-- Navbar -->
        <nav class="main-header navbar navbar-expand navbar-white navbar-light">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
                </li>
                <li class="nav-item d-none d-sm-inline-block">
                    <a href="/" class="nav-link" target="_blank">View Site</a>
                </li>
            </ul>
            <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Sidebar -->
        <aside class="main-sidebar sidebar-dark-primary elevation-4">
            <a href="/admin/dashboard" class="brand-link">
                <span class="brand-text font-weight-light">Serein Blog Admin</span>
            </a>
            <div class="sidebar">
                <nav class="mt-2">
                    <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu">
                        <li class="nav-item">
                            <a href="/admin/dashboard" class="nav-link">
                                <i class="nav-icon fas fa-tachometer-alt"></i>
                                <p>Dashboard</p>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="/admin/articles" class="nav-link">
                                <i class="nav-icon fas fa-newspaper"></i>
                                <p>Articles</p>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="/admin/projects" class="nav-link active">
                                <i class="nav-icon fas fa-folder"></i>
                                <p>Projects</p>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="/admin/settings" class="nav-link">
                                <i class="nav-icon fas fa-cog"></i>
                                <p>Settings</p>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="/api/docs" class="nav-link" target="_blank">
                                <i class="nav-icon fas fa-book"></i>
                                <p>API Docs</p>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </aside>

        <!-- Content Wrapper -->
        <div class="content-wrapper">
            <div class="content-header">
                <div class="container-fluid">
                    <div class="row mb-2">
                        <div class="col-sm-6">
                            <h1 class="m-0">Projects Management</h1>
                        </div>
                        <div class="col-sm-6">
                            <button class="btn btn-primary float-right" data-toggle="modal" data-target="#projectModal"
                                onclick="openCreateModal()">
                                <i class="fas fa-plus"></i> New Project
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <section class="content">
                <div class="container-fluid">
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">All Projects</h3>
                        </div>
                        <div class="card-body">
                            <table id="projectsTable" class="table table-bordered table-striped">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Title</th>
                                        <th>Technologies</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <footer class="main-footer">
            <strong>Copyright &copy; 2024 <a href="/">Serein Blog</a>.</strong> All rights reserved.
        </footer>
    </div>

    <!-- Project Modal -->
    <div class="modal fade" id="projectModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h4 class="modal-title" id="modalTitle">Create Project</h4>
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="projectForm">
                        <input type="hidden" id="projectId">
                        <div class="form-group">
                            <label>Title *</label>
                            <input type="text" class="form-control" id="title" required>
                        </div>
                        <div class="form-group">
                            <label>Description *</label>
                            <textarea class="form-control" id="description" rows="4" required></textarea>
                        </div>
                        <div class="form-group">
                            <label>Technologies</label>
                            <input type="text" class="form-control" id="technologies"
                                placeholder="Python, FastAPI, PostgreSQL">
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>GitHub URL</label>
                                    <input type="url" class="form-control" id="github_url"
                                        placeholder="https://github.com/...">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Live URL</label>
                                    <input type="url" class="form-control" id="live_url" placeholder="https://...">
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Status</label>
                            <select class="form-control" id="status">
                                <option value="active">Active</option>
                                <option value="completed">Completed</option>
                                <option value="archived">Archived</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="saveProject()">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap4.min.js"></script>

    <script>
        const token = localStorage.getItem('access_token');
        if (!token) window.location.href = '/admin';

        let projectsTable;

        $(document).ready(function () {
            projectsTable = $('#projectsTable').DataTable({
                ajax: {
                    url: '/api/projects/',
                    headers: { 'Authorization': `Bearer ${token}` },
                    dataSrc: ''
                },
                columns: [
                    { data: 'id' },
                    { data: 'title' },
                    { data: 'technologies' },
                    {
                        data: 'status',
                        render: function (data) {
                            const badges = {
                                'active': 'success',
                                'completed': 'primary',
                                'archived': 'secondary'
                            };
                            return `<span class="badge badge-${badges[data] || 'info'}">${data}</span>`;
                        }
                    },
                    {
                        data: null,
                        render: function (data) {
                            return `
                        <button class="btn btn-sm btn-info" onclick='editProject(${JSON.stringify(data)})'>
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="deleteProject(${data.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    `;
                        }
                    }
                ]
            });
        });

        function openCreateModal() {
            $('#modalTitle').text('Create Project');
            $('#projectForm')[0].reset();
            $('#projectId').val('');
        }

        function editProject(project) {
            $('#modalTitle').text('Edit Project');
            $('#projectId').val(project.id);
            $('#title').val(project.title);
            $('#description').val(project.description);
            $('#technologies').val(project.technologies);
            $('#github_url').val(project.github_url || '');
            $('#live_url').val(project.live_url || '');
            $('#status').val(project.status);
            $('#projectModal').modal('show');
        }

        async function saveProject() {
            const id = $('#projectId').val();
            const data = {
                title: $('#title').val(),
                description: $('#description').val(),
                technologies: $('#technologies').val(),
                github_url: $('#github_url').val() || null,
                live_url: $('#live_url').val() || null,
                status: $('#status').val()
            };

            try {
                const url = id ? `/api/projects/${id}` : '/api/projects/';
                const method = id ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    $('#projectModal').modal('hide');
                    projectsTable.ajax.reload();
                    alert('Project saved successfully!');
                } else {
                    alert('Error saving project');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error saving project');
            }
        }

        async function deleteProject(id) {
            if (!confirm('Are you sure you want to delete this project?')) return;

            try {
                const response = await fetch(`/api/projects/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    projectsTable.ajax.reload();
                    alert('Project deleted successfully!');
                } else {
                    alert('Error deleting project');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error deleting project');
            }
        }

        function logout() {
            localStorage.removeItem('access_token');
            window.location.href = '/admin';
        }
    </script>
</body>

</html>
