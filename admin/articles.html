<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Articles - Serein Blog Admin</title>

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap4.min.css">
</head>

<body class="hold-transition sidebar-mini">
    <div class="wrapper">

        <!-- Navbar -->
        <nav class="main-header navbar navbar-expand navbar-white navbar-light">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
                </li>
                <li class="nav-item d-none d-sm-inline-block">
                    <a href="/" class="nav-link" target="_blank">View Site</a>
                </li>
            </ul>
            <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Sidebar -->
        <aside class="main-sidebar sidebar-dark-primary elevation-4">
            <a href="/admin/dashboard" class="brand-link">
                <span class="brand-text font-weight-light">Serein Blog Admin</span>
            </a>
            <div class="sidebar">
                <nav class="mt-2">
                    <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu">
                        <li class="nav-item">
                            <a href="/admin/dashboard" class="nav-link">
                                <i class="nav-icon fas fa-tachometer-alt"></i>
                                <p>Dashboard</p>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="/admin/articles" class="nav-link active">
                                <i class="nav-icon fas fa-newspaper"></i>
                                <p>Articles</p>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="/admin/projects" class="nav-link">
                                <i class="nav-icon fas fa-folder"></i>
                                <p>Projects</p>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="/admin/settings" class="nav-link">
                                <i class="nav-icon fas fa-cog"></i>
                                <p>Settings</p>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="/api/docs" class="nav-link" target="_blank">
                                <i class="nav-icon fas fa-book"></i>
                                <p>API Docs</p>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </aside>

        <!-- Content Wrapper -->
        <div class="content-wrapper">
            <div class="content-header">
                <div class="container-fluid">
                    <div class="row mb-2">
                        <div class="col-sm-6">
                            <h1 class="m-0">Articles Management</h1>
                        </div>
                        <div class="col-sm-6">
                            <button class="btn btn-primary float-right" data-toggle="modal" data-target="#articleModal"
                                onclick="openCreateModal()">
                                <i class="fas fa-plus"></i> New Article
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <section class="content">
                <div class="container-fluid">
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">All Articles</h3>
                        </div>
                        <div class="card-body">
                            <table id="articlesTable" class="table table-bordered table-striped">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Title</th>
                                        <th>Status</th>
                                        <th>Created</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <footer class="main-footer">
            <strong>Copyright &copy; 2024 <a href="/">Serein Blog</a>.</strong> All rights reserved.
        </footer>
    </div>

    <!-- Article Modal -->
    <div class="modal fade" id="articleModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h4 class="modal-title" id="modalTitle">Create Article</h4>
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="articleForm">
                        <input type="hidden" id="articleId">
                        <div class="form-group">
                            <label>Title *</label>
                            <input type="text" class="form-control" id="title" required>
                        </div>
                        <div class="form-group">
                            <label>Slug</label>
                            <input type="text" class="form-control" id="slug">
                            <small class="form-text text-muted">Leave empty to auto-generate</small>
                        </div>
                        <div class="form-group">
                            <label>Excerpt</label>
                            <textarea class="form-control" id="excerpt" rows="2"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Content *</label>
                            <textarea class="form-control" id="content" rows="10" required></textarea>
                        </div>
                        <div class="form-group">
                            <label>Status</label>
                            <select class="form-control" id="status">
                                <option value="draft">Draft</option>
                                <option value="published">Published</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="saveArticle()">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap4.min.js"></script>

    <script>
        const token = localStorage.getItem('access_token');
        if (!token) window.location.href = '/admin';

        let articlesTable;

        $(document).ready(function () {
            articlesTable = $('#articlesTable').DataTable({
                ajax: {
                    url: '/api/articles/',
                    headers: { 'Authorization': `Bearer ${token}` },
                    dataSrc: ''
                },
                columns: [
                    { data: 'id' },
                    { data: 'title' },
                    {
                        data: 'status',
                        render: function (data) {
                            return data === 'published'
                                ? '<span class="badge badge-success">Published</span>'
                                : '<span class="badge badge-warning">Draft</span>';
                        }
                    },
                    {
                        data: 'created_at',
                        render: function (data) {
                            return new Date(data).toLocaleDateString();
                        }
                    },
                    {
                        data: null,
                        render: function (data) {
                            return `
                        <button class="btn btn-sm btn-info" onclick='editArticle(${JSON.stringify(data)})'>
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="deleteArticle(${data.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    `;
                        }
                    }
                ]
            });
        });

        function openCreateModal() {
            $('#modalTitle').text('Create Article');
            $('#articleForm')[0].reset();
            $('#articleId').val('');
        }

        function editArticle(article) {
            $('#modalTitle').text('Edit Article');
            $('#articleId').val(article.id);
            $('#title').val(article.title);
            $('#slug').val(article.slug);
            $('#excerpt').val(article.excerpt);
            $('#content').val(article.content);
            $('#status').val(article.status);
            $('#articleModal').modal('show');
        }

        async function saveArticle() {
            const id = $('#articleId').val();
            const data = {
                title: $('#title').val(),
                slug: $('#slug').val() || null,
                excerpt: $('#excerpt').val(),
                content: $('#content').val(),
                status: $('#status').val()
            };

            try {
                const url = id ? `/api/articles/${id}` : '/api/articles/';
                const method = id ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    $('#articleModal').modal('hide');
                    articlesTable.ajax.reload();
                    alert('Article saved successfully!');
                } else {
                    alert('Error saving article');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error saving article');
            }
        }

        async function deleteArticle(id) {
            if (!confirm('Are you sure you want to delete this article?')) return;

            try {
                const response = await fetch(`/api/articles/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    articlesTable.ajax.reload();
                    alert('Article deleted successfully!');
                } else {
                    alert('Error deleting article');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error deleting article');
            }
        }

        function logout() {
            localStorage.removeItem('access_token');
            window.location.href = '/admin';
        }
    </script>
</body>

</html>
