[build]
  # Build settings
  publish = "."
  command = "echo 'Static site - no build required'"

[build.environment]
  # Environment variables if needed
  NODE_VERSION = "18"

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:;"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache HTML files for shorter time
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Redirects (backup to _redirects file)
[[redirects]]
  from = "/admin/*"
  to = "/admin-not-available.html"
  status = 200

[[redirects]]
  from = "/api.php"
  to = "/api-not-available.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/api-not-available.html"
  status = 200

# Clean URL redirects
[[redirects]]
  from = "/home"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/portfolio"
  to = "/services.html"
  status = 200

[[redirects]]
  from = "/blog"
  to = "/blog.html"
  status = 200

[[redirects]]
  from = "/post"
  to = "/post.html"
  status = 200

# Remove .html extension
[[redirects]]
  from = "/*.html"
  to = "/:splat"
  status = 301

# Fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200